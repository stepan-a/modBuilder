name: MATLAB Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # push the coverage badge to the coverage-badge branch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024b

      - name: Generate test list from Meson configuration
        run: |
          python3 -c "
          import re, pathlib
          text = pathlib.Path('tests/meson.build').read_text()
          m = re.search(r'listoftests\s*=\s*\[(.*?)\]', text, re.DOTALL)
          tests = re.findall(r\"'([^']+)'\", m.group(1))
          pathlib.Path('tests/testlist.txt').write_text('\n'.join(tests) + '\n')
          "

      - name: Run tests with coverage
        uses: matlab-actions/run-command@v2
        with:
          command: cd('tests'); run_all_tests_with_coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      # Self-contained coverage badge: parse the Cobertura report, render an
      # SVG locally (no external service) and report the figure in the run
      # summary. Runs only when the tests above passed.
      - name: Generate coverage badge and job summary
        run: |
          cov="$(python3 .github/scripts/coverage_badge.py coverage.xml badge.svg)"
          printf '%s\n' "$cov" > cov.txt
          { echo "## Coverage"; echo; echo "Line coverage: **$cov**"; } >> "$GITHUB_STEP_SUMMARY"

      # Publish the badge to a dedicated orphan branch using the built-in
      # token; the README badge points at this branch via raw.githubusercontent.
      # Only on pushes to master (PRs from forks cannot push, and the badge
      # should reflect the integrated branch).
      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tmp="$(mktemp -d)"
          cp badge.svg "$tmp/badge.svg"
          cd "$tmp"
          git init -q
          git checkout -q -b coverage-badge
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badge.svg
          git commit -q -m "coverage: $(cat "$GITHUB_WORKSPACE/cov.txt")"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" coverage-badge
