variables:
  MATLAB_VERSION: R2024b
  TERM: linux
  GIT_STRATEGY: clone

test:
  stage: build
  script:
    - meson setup -Dmatlab_path=/opt/MATLAB/$MATLAB_VERSION/bin/matlab build
    - meson test -C build -j10
  artifacts:
    when: always
    paths:
      - build/meson-logs/testlog.txt
    expire_in: 1 week

doc:
  stage: build
  script:
   - make -C doc/tex
  artifacts:
    paths:
      - doc/slides.pdf
